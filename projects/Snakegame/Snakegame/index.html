<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu du Serpent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🐍 Jeu du Serpent 🍎</h1>
        
        <div class="info-panel">
            <div class="score-box">
                <span>Score:</span>
                <p id="score">0</p>
            </div>
            <div class="score-box">
                <span>Meilleur Score:</span>
                <p id="bestScore">0</p>
            </div>
            <div class="score-box">
                <span>Niveau:</span>
                <p id="level">1</p>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button id="startBtn" class="btn btn-start">Démarrer le jeu</button>
            <button id="pauseBtn" class="btn btn-pause" disabled>Pause</button>
            <button id="resetBtn" class="btn btn-reset">Recommencer</button>
        </div>

        <div class="instructions">
            <h3>Instructions:</h3>
            <ul>
                <li>Utilisez les <strong>flèches</strong> ou les touches <strong>WASD</strong> pour diriger le serpent</li>
                <li>Mangez les pommes 🍎 pour grandir</li>
                <li>Évitez les murs et votre propre corps</li>
                <li>Plus vous mangez, plus vite le serpent se déplace!</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
