<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" width="480" height="260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond principal -->
  <rect width="480" height="260" fill="url(#bg)" rx="10"/>

  <!-- Barre de titre terminal -->
  <rect x="0" y="0" width="480" height="30" fill="#1c1c1e" rx="10"/>
  <rect x="0" y="20" width="480" height="10" fill="#1c1c1e"/>
  <!-- Boutons fenêtre -->
  <circle cx="16" cy="15" r="5.5" fill="#ff5f57"/>
  <circle cx="32" cy="15" r="5.5" fill="#ffbd2e"/>
  <circle cx="48" cy="15" r="5.5" fill="#28c940"/>
  <!-- Titre terminal -->
  <text x="240" y="19" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#888">snake.exe — Jeu du Serpent en C</text>

  <!-- Zone de jeu (grille ASCII) -->
  <!-- Bordure du terrain -->
  <text x="18" y="50" font-family="'Courier New', monospace" font-size="9" fill="#e0b050" letter-spacing="1">##########################################</text>
  <text x="18" y="60" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text><text x="428" y="60" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text>
  <text x="18" y="70" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text><text x="428" y="70" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text>
  <text x="18" y="80" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text><text x="428" y="80" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text>
  <text x="18" y="90" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text><text x="428" y="90" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text>
  <text x="18" y="100" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text><text x="428" y="100" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text>
  <text x="18" y="110" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text><text x="428" y="110" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text>
  <text x="18" y="120" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text><text x="428" y="120" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text>
  <text x="18" y="130" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text><text x="428" y="130" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text>
  <text x="18" y="140" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text><text x="428" y="140" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text>
  <text x="18" y="150" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text><text x="428" y="150" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">#</text>
  <text x="18" y="160" font-family="'Courier New', monospace" font-size="9" fill="#e0b050">##########################################</text>

  <!-- 3 Pommes -->
  <text x="100" y="70" font-family="'Courier New', monospace" font-size="11" fill="#e74c3c" filter="url(#glow)">*</text>
  <text x="280" y="90" font-family="'Courier New', monospace" font-size="11" fill="#e74c3c" filter="url(#glow)">*</text>
  <text x="360" y="130" font-family="'Courier New', monospace" font-size="11" fill="#e74c3c" filter="url(#glow)">*</text>

  <!-- Serpent corps (oooo) -->
  <text x="60" y="130" font-family="'Courier New', monospace" font-size="10" fill="#27ae60">ooooooo</text>
  <!-- virage vertical -->
  <text x="122" y="120" font-family="'Courier New', monospace" font-size="10" fill="#27ae60">o</text>
  <text x="122" y="110" font-family="'Courier New', monospace" font-size="10" fill="#27ae60">o</text>
  <text x="122" y="100" font-family="'Courier New', monospace" font-size="10" fill="#27ae60">o</text>
  <!-- virage horizontal -->
  <text x="130" y="100" font-family="'Courier New', monospace" font-size="10" fill="#27ae60">oooo</text>
  <!-- Tête -->
  <text x="170" y="100" font-family="'Courier New', monospace" font-size="10" fill="#2ecc71" filter="url(#glow)" font-weight="bold">@</text>

  <!-- Séparateur HUD -->
  <line x1="18" y1="163" x2="446" y2="163" stroke="#333" stroke-width="1"/>

  <!-- HUD -->
  <text x="22" y="175" font-family="'Courier New', monospace" font-size="8.5" fill="#f39c12">Score: 70  |  Pommes: 2/3  |  Longueur: 12  |  [ORDI RAPIDE]</text>
  <text x="22" y="187" font-family="'Courier New', monospace" font-size="7.5" fill="#555">P = Sauvegarder  |  Echap = Quitter</text>

  <!-- Badge LANGAGE C -->
  <rect x="22" y="200" width="72" height="22" fill="#1a6b2a" rx="4" stroke="#28c940" stroke-width="1"/>
  <text x="58" y="215" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#28c940" font-weight="bold">Langage C</text>

  <!-- Badge conio.h -->
  <rect x="102" y="200" width="58" height="22" fill="#1a3a5c" rx="4" stroke="#3498db" stroke-width="1"/>
  <text x="131" y="215" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#3498db">conio.h</text>

  <!-- Badge IA greedy -->
  <rect x="168" y="200" width="64" height="22" fill="#4a1a5c" rx="4" stroke="#9b59b6" stroke-width="1"/>
  <text x="200" y="215" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#9b59b6">IA greedy</text>

  <!-- Badge Save/Load -->
  <rect x="240" y="200" width="68" height="22" fill="#5c3a1a" rx="4" stroke="#e67e22" stroke-width="1"/>
  <text x="274" y="215" text-anchor="middle" font-family="'Courier New', monospace" font-size="9.5" fill="#e67e22">Save/Load</text>

  <!-- Badge GCC -->
  <rect x="316" y="200" width="44" height="22" fill="#1a1a4a" rx="4" stroke="#5b5fef" stroke-width="1"/>
  <text x="338" y="215" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#5b5fef">GCC</text>

  <!-- Légende pommes -->
  <text x="22" y="245" font-family="'Courier New', monospace" font-size="8" fill="#888">* pommes (3/round)   @ tête du serpent   o corps   # bordures</text>

  <!-- Compilation hint -->
  <text x="370" y="245" font-family="'Courier New', monospace" font-size="7.5" fill="#444">gcc snake.c -o snake.exe</text>
</svg>
