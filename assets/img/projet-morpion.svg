<svg xmlns="http://www.w3.org/2000/svg" viewBox="450 230 660 460" role="img" aria-labelledby="title desc">
  <title id="title">Morpion 2.0</title>
  <desc id="desc">Illustration d'un projet Morpion avec une grille violette et des jetons stylises.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="180" cy="140" r="120" fill="#e2e8f0" opacity="0.75"/>
  <circle cx="1010" cy="130" r="110" fill="#c4b5fd" opacity="0.55"/>
  <circle cx="1040" cy="690" r="150" fill="#ddd6fe" opacity="0.7"/>

  <rect x="90" y="110" width="320" height="580" rx="28" fill="url(#panel)" stroke="#cbd5e1" stroke-width="4"/>
  <text x="130" y="180" fill="#1e293b" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">Morpion 2.0</text>
  <text x="130" y="240" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="28">Choix des symboles</text>

  <rect x="130" y="285" width="240" height="64" rx="18" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="3"/>
  <text x="150" y="326" fill="#5b21b6" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Joueur 1</text>
  <circle cx="330" cy="317" r="20" fill="#fde68a"/>

  <rect x="130" y="385" width="240" height="64" rx="18" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="3"/>
  <text x="150" y="426" fill="#5b21b6" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Joueur 2</text>
  <circle cx="330" cy="417" r="20" fill="#93c5fd"/>

  <rect x="130" y="520" width="110" height="58" rx="16" fill="#ede9fe" stroke="#c4b5fd" stroke-width="3"/>
  <text x="155" y="558" fill="#4c1d95" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Start</text>
  <rect x="258" y="520" width="110" height="58" rx="16" fill="#ede9fe" stroke="#c4b5fd" stroke-width="3"/>
  <text x="281" y="558" fill="#4c1d95" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Reset</text>

  <rect x="490" y="110" width="620" height="580" rx="34" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <text x="680" y="182" text-anchor="middle" fill="#4c1d95" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Choisissez vos symboles puis lancez la partie</text>

  <g transform="translate(635 400)">
    <rect x="-180" y="-180" width="360" height="360" rx="28" fill="#faf5ff" stroke="#d8b4fe" stroke-width="8"/>
    <line x1="-60" y1="-160" x2="-60" y2="160" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round"/>
    <line x1="60" y1="-160" x2="60" y2="160" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round"/>
    <line x1="-160" y1="-60" x2="160" y2="-60" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round"/>
    <line x1="-160" y1="60" x2="160" y2="60" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round"/>

    <line x1="-135" y1="-135" x2="-105" y2="-105" stroke="#7c3aed" stroke-width="18" stroke-linecap="round"/>
    <line x1="-105" y1="-135" x2="-135" y2="-105" stroke="#7c3aed" stroke-width="18" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#2563eb" stroke-width="16"/>
    <line x1="105" y1="105" x2="135" y2="135" stroke="#7c3aed" stroke-width="18" stroke-linecap="round"/>
    <line x1="135" y1="105" x2="105" y2="135" stroke="#7c3aed" stroke-width="18" stroke-linecap="round"/>
  </g>
</svg>
